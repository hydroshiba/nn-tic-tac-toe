<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Tic-Tac-Toe</h1>
  <div id="status">X's turn</div>

  <div class="game-container">
    <div id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>
    
    <div id="controls">
      <label for="ai-model">Select model</label>
      <select id="ai-model">
      </select>
      
      <div id="inference-time" style="font-size: 0.85rem; color: color-mix(in srgb, var(--color-accent), black 30%); margin-top: -0.25rem; margin-bottom: 0.5rem;">Inference time: -- ms</div>
      
      <label for="temperature">Temperature: <span id="temp-val">0.1</span></label>
      <input type="range" id="temperature" min="0.0" max="5.0" step="0.1" value="0.1">
      
      <div class="actions">
        <button id="make-move">Make move</button>
        <button id="reset">New game</button>
      </div>
    </div>
  </div>

  <div id="value-display" style="text-align: center; margin-top: 10px; margin-bottom: 10px; font-weight: 500; font-family: monospace; color: color-mix(in srgb, var(--color-accent), black 50%);">Value: <span id="value-eval">-</span></div>

  <div id="scoreboard">
    <div class="score-item"><span class="label-x">X</span> — <span id="sx">0</span> wins</div>
    <div class="score-item"><span class="label-d">Draws</span> — <span id="sd">0</span></div>
    <div class="score-item"><span class="label-o">O</span> — <span id="so">0</span> wins</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
